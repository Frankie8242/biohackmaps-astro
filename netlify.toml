[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

[[redirects]]
  from = "/saunamind"
  to = "https://www.sauna-mind.com/?utm_source=biohackmaps&utm_medium=referral&utm_campaign=legacy_page"
  status = 301
  force = true

[[redirects]]
  from = "/saunamind/*"
  to = "https://www.sauna-mind.com/?utm_source=biohackmaps&utm_medium=referral&utm_campaign=legacy_page"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
